#
# Configuración de OpenOCD para el debugger/programador ON-BOARD de la
# EDU-CIAA-NXP (un FT2232H, U6 en el esquemático), NO un LPC-Link2 ni un
# probe SWD genérico. Adaptado del script oficial del proyecto CIAA:
#   github.com/ciaa/firmware_v1/blob/master/modules/tools/openocd/cfg/
#     cortexM4/lpc43xx/lpc4337/ciaa-nxp.cfg
#
# Diferencias clave respecto de un LPC4337 "genérico":
# - Transporte JTAG, no SWD: el FT2232H de esta placa está cableado como
#   adaptador JTAG (interfaz "ftdi" + ftdi_layout_init), no como CMSIS-DAP.
#   No asumir el VID/PID 0x1fc9 de NXP (LPC-Link2) ni "transport select swd".
# - Cadena JTAG de DOS TAPs: el LPC4337 es dual-core (M4 + M0), y ambos
#   TAP quedan visibles en la cadena JTAG, por lo que hay que declarar los
#   dos con "jtag newtap" para que el scan de la cadena sea correcto. Pero
#   solo se crea un "target" (DAP + cortex_m) para el M4: el M0 no arranca
#   hasta que el M4 lo habilita (CREG) y este port no lo usa, así que un
#   target M0 queda sin clock y sin responder, haciendo timeout en cada
#   "reset halt" (visto como "TARGET: lpc4337.m0 - Not halted").
# - TRST/SRST no están cableados más allá del buffer en esta placa: por eso
#   "reset_config none" + "cortex_m reset_config vectreset" en vez del
#   connect_assert_srst que usaríamos con un probe que sí tenga nRESET.
# - El banco de flash se declara como una sola región de 0x80000 (512 KB)
#   arrancando en 0x1a000000, aunque el LPC4337 tiene físicamente dos
#   bancos de 256 KB (A y B): así es como lo hace el script oficial de CIAA,
#   y es lo que se usa en la práctica para programar la placa.

adapter driver ftdi
adapter usb vid_pid 0x0403 0x6010
ftdi channel 0
ftdi layout_init 0x0708 0xfffb

transport select jtag

adapter speed 2000

set _CHIPNAME lpc4337

set _M4_JTAG_TAPID 0x4ba00477
set _M0_JTAG_TAPID 0x0ba01477

jtag newtap $_CHIPNAME m4 -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_M4_JTAG_TAPID
jtag newtap $_CHIPNAME m0 -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_M0_JTAG_TAPID

dap create $_CHIPNAME.m4.dap -chain-position $_CHIPNAME.m4

target create $_CHIPNAME.m4 cortex_m -dap $_CHIPNAME.m4.dap

# El algoritmo de flasheo del driver lpc2000 necesita RAM de trabajo en el
# target para correr. Se usa la SRAM AHB (banco 0x20000000, 32 KB) en vez
# de la SRAM local 0x10000000 porque esta última es la que Zephyr mapea
# como zephyr,sram (ver dts/arm/nxp/nxp_lpc4337.dtsi): así no compite con
# nada que use la aplicación.
$_CHIPNAME.m4 configure -work-area-phys 0x20000000 -work-area-size 0x2000 \
    -work-area-backup 0

# lpc4300: variante del driver lpc2000 que cubre toda la familia
# LPC43x2/3/5/7 (probada por el proyecto CIAA con LPC4337/LPC4357). El
# parámetro de clock (en kHz) es el que usa IAP internamente al programar.
flash bank $_CHIPNAME.flash lpc2000 0x1a000000 0x80000 0 0 $_CHIPNAME.m4 \
    lpc4300 96000 calc_checksum

reset_config none
cortex_m reset_config vectreset
